<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>if(localStorage.getItem('ideaz_theme')==='light')document.documentElement.classList.add('light');</script>
  <title>Monitor Ideaz – Restablecer contraseña</title>
  <meta name="application-name" content="Monitor Ideaz">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          colors: {
            brand: { DEFAULT: '#6366f1', light: '#818cf8', dark: '#4f46e5' }
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="css/main.css">
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-sm">
    <div class="flex items-center justify-center gap-3 mb-8">
      <div class="w-11 h-11 rounded-xl bg-indigo-600 flex items-center justify-center flex-shrink-0">
        <span class="text-white font-black text-lg">I</span>
      </div>
      <div>
        <div class="font-black text-slate-100 text-lg leading-none">Monitor Ideaz</div>
        <div class="text-xs text-slate-400 font-medium">Dashboard del equipo</div>
      </div>
    </div>

    <div id="loading-state" class="bg-slate-900 border border-slate-700 rounded-2xl p-6 text-center text-sm text-slate-400">
      Verificando enlace…
    </div>

    <div id="invalid-state" style="display:none" class="bg-slate-900 border border-slate-700 rounded-2xl p-6">
      <h1 class="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-4">Enlace inválido</h1>
      <p class="text-sm text-slate-300 mb-5">Este enlace de recuperación es inválido o ya expiró. Solicita uno nuevo desde la pantalla de inicio de sesión.</p>
      <a href="login.html" class="block w-full text-center bg-indigo-600 hover:bg-indigo-500 text-white font-semibold px-4 py-2.5 rounded-lg text-sm transition-colors">
        Ir a iniciar sesión
      </a>
    </div>

    <form id="reset-form" style="display:none" class="bg-slate-900 border border-slate-700 rounded-2xl p-6">
      <h1 class="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-5">Nueva contraseña</h1>

      <div id="reset-message" style="display:none" class="mb-4 p-3 rounded-xl text-sm"></div>

      <label class="block text-xs text-slate-400 font-medium mb-1" for="reset-password">Nueva contraseña</label>
      <input id="reset-password" type="password" required autocomplete="new-password" minlength="8"
        class="w-full bg-slate-800 border border-slate-600 rounded-lg px-3 py-2 text-sm text-slate-100 placeholder-slate-500 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 mb-4"
        placeholder="Mínimo 8 caracteres">

      <label class="block text-xs text-slate-400 font-medium mb-1" for="reset-password-confirm">Confirmar contraseña</label>
      <input id="reset-password-confirm" type="password" required autocomplete="new-password" minlength="8"
        class="w-full bg-slate-800 border border-slate-600 rounded-lg px-3 py-2 text-sm text-slate-100 placeholder-slate-500 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 mb-5"
        placeholder="Repite la contraseña">

      <button id="reset-btn" type="submit"
        class="w-full bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 disabled:cursor-not-allowed text-white font-semibold px-4 py-2.5 rounded-lg text-sm transition-colors">
        Restablecer contraseña
      </button>
    </form>
  </div>

  <script>
  (() => {
    const API = 'backend';
    const token = new URLSearchParams(location.search).get('token') || '';

    const loadingState = document.getElementById('loading-state');
    const invalidState = document.getElementById('invalid-state');
    const form = document.getElementById('reset-form');
    const msgEl = document.getElementById('reset-message');
    const btn = document.getElementById('reset-btn');

    function showMessage(msg, isError) {
      msgEl.textContent = msg;
      msgEl.className = isError
        ? 'mb-4 p-3 rounded-xl text-sm bg-rose-500/10 border border-rose-500/30 text-rose-300'
        : 'mb-4 p-3 rounded-xl text-sm bg-emerald-500/10 border border-emerald-500/30 text-emerald-300';
      msgEl.style.display = '';
    }

    async function init() {
      if (!token) {
        loadingState.style.display = 'none';
        invalidState.style.display = '';
        return;
      }
      try {
        const res = await fetch(`${API}/auth/reset_password.php?token=${encodeURIComponent(token)}`);
        const data = await res.json().catch(() => ({}));
        loadingState.style.display = 'none';
        if (data.valid) {
          form.style.display = '';
        } else {
          invalidState.style.display = '';
        }
      } catch (e) {
        loadingState.style.display = 'none';
        invalidState.style.display = '';
      }
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('reset-password').value;
      const confirm = document.getElementById('reset-password-confirm').value;

      if (password.length < 8) {
        showMessage('La contraseña debe tener al menos 8 caracteres', true);
        return;
      }
      if (password !== confirm) {
        showMessage('Las contraseñas no coinciden', true);
        return;
      }

      btn.disabled = true;
      try {
        const res = await fetch(`${API}/auth/reset_password.php`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || `Error ${res.status}`);
        showMessage('Contraseña actualizada ✓ Redirigiendo a iniciar sesión…', false);
        setTimeout(() => location.replace('login.html'), 2000);
      } catch (err) {
        showMessage(err.message === 'Failed to fetch'
          ? 'No se pudo contactar el servidor. Verifica tu conexión.'
          : err.message, true);
        btn.disabled = false;
      }
    });

    init();
  })();
  </script>
</body>
</html>
