<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agenda – IDEAZ</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/main.css">
</head>
<body class="bg-slate-950 text-slate-100 font-sans">

  <!-- Sidebar (siempre visible, nav inyectada por sidebar.js) -->
  <aside id="app-sidebar" class="fixed left-0 top-0 h-screen w-64 bg-slate-900 border-r border-slate-700 flex flex-col z-50 overflow-y-auto">
    <!-- Bottom status -->
    <div class="p-3 border-t border-slate-700 flex-shrink-0 sidebar-text">
      <span class="text-xs text-slate-400" id="last-updated"></span>
    </div>
  </aside>

  <!-- Contenido principal -->
  <main class="ml-64 min-h-screen">

  <!-- State: auth -->
  <div id="state-auth" style="display:none" class="min-h-screen flex items-center justify-center">
    <div class="text-center">
      <p class="text-slate-400 mb-4">Configura tus credenciales de Trello para continuar.</p>
      <a href="configuracion.html" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2.5 rounded-lg font-semibold text-sm transition-colors">
        Ir a Configuración
      </a>
    </div>
  </div>

  <!-- State: loading -->
  <div id="state-loading" style="display:none" class="min-h-screen flex items-center justify-center">
    <div class="text-center">
      <div class="w-10 h-10 border-2 border-indigo-600 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
      <p class="text-slate-400 text-sm">Cargando agenda…</p>
    </div>
  </div>

  <!-- State: error -->
  <div id="state-error" style="display:none" class="min-h-screen flex items-center justify-center">
    <div class="text-center max-w-md">
      <p class="text-red-400 text-lg font-semibold mb-2">Error al cargar datos</p>
      <p id="error-msg" class="text-slate-400 text-sm mb-5"></p>
      <button onclick="Agenda.load(true)" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2.5 rounded-lg font-semibold text-sm transition-colors">
        Reintentar
      </button>
    </div>
  </div>

  <!-- State: agenda -->
  <div id="state-agenda" style="display:none">
    <main class="p-6 min-w-0">

      <!-- Page header -->
      <div class="flex flex-wrap items-center justify-between gap-4 mb-6">
        <div>
          <h1 class="text-2xl font-bold">Agenda del Equipo</h1>
          <p class="text-slate-400 text-sm mt-0.5">Tareas pendientes por fecha de entrega</p>
        </div>

        <div class="flex flex-wrap items-center gap-2">
          <!-- Board filter -->
          <select id="board-filter" onchange="Agenda._applyFilters()"
            class="bg-slate-800 border border-slate-700 text-slate-200 text-sm rounded-lg px-3 py-2 focus:outline-none focus:border-indigo-500 max-w-xs">
          </select>

          <!-- Member filter -->
          <select id="member-filter" onchange="Agenda._applyFilters()"
            class="bg-slate-800 border border-slate-700 text-slate-200 text-sm rounded-lg px-3 py-2 focus:outline-none focus:border-indigo-500 max-w-xs">
          </select>

          <!-- View toggle -->
          <div class="flex bg-slate-800 rounded-lg p-1 gap-1">
            <button id="btn-month" onclick="Agenda.setView('month')"
              class="px-4 py-1.5 rounded-md text-sm font-semibold transition-colors bg-indigo-600 text-white">
              Mes
            </button>
            <button id="btn-week" onclick="Agenda.setView('week')"
              class="px-4 py-1.5 rounded-md text-sm font-semibold transition-colors text-slate-400 hover:text-white">
              Semana
            </button>
          </div>
        </div>
      </div>

      <!-- Calendar nav -->
      <div class="flex items-center gap-3 mb-4">
        <button onclick="Agenda.navigate(-1)"
          class="p-2 rounded-lg hover:bg-slate-800 transition-colors text-slate-400 hover:text-slate-200">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
          </svg>
        </button>

        <h2 id="cal-title" class="text-lg font-bold text-slate-100 min-w-64 text-center"></h2>

        <button onclick="Agenda.navigate(1)"
          class="p-2 rounded-lg hover:bg-slate-800 transition-colors text-slate-400 hover:text-slate-200">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
          </svg>
        </button>

        <button onclick="Agenda.goToday()"
          class="px-3 py-1.5 rounded-lg text-xs font-semibold text-slate-400 hover:bg-slate-800 hover:text-slate-200 transition-colors border border-slate-700">
          Hoy
        </button>

        <!-- Status legend -->
        <div id="legend" class="ml-auto flex flex-wrap items-center gap-3"></div>
      </div>

      <!-- Calendar -->
      <div id="cal-container"></div>

    </main>
  </div><!-- /state-agenda -->

  </main><!-- /ml-64 -->

  <!-- Task detail modal -->
  <div id="modal" style="display:none"
    class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
    <div class="bg-slate-900 border border-slate-700 rounded-xl w-full max-w-lg shadow-2xl">

      <div class="p-6">
        <div class="flex items-start justify-between mb-4">
          <div class="flex-1 pr-4 min-w-0">
            <p id="modal-board" class="text-xs font-semibold text-indigo-400 mb-1 truncate"></p>
            <h3 id="modal-title" class="text-lg font-bold text-slate-100 leading-snug"></h3>
          </div>
          <button onclick="Agenda.closeModal()"
            class="text-slate-500 hover:text-slate-300 transition-colors flex-shrink-0 mt-0.5">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
          </button>
        </div>

        <div class="space-y-3">
          <!-- Status + list -->
          <div class="flex items-center gap-2 flex-wrap">
            <span id="modal-dot" class="w-2.5 h-2.5 rounded-full flex-shrink-0"></span>
            <span id="modal-status" class="text-sm font-semibold text-slate-200"></span>
            <span class="text-slate-700">·</span>
            <span id="modal-list" class="text-sm text-slate-400"></span>
          </div>

          <!-- Due date -->
          <div class="flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-slate-500 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
            </svg>
            <span id="modal-due" class="text-sm text-slate-300"></span>
          </div>

          <!-- Members -->
          <div id="modal-members" class="flex flex-col gap-1.5"></div>

          <!-- Labels -->
          <div id="modal-labels" class="flex flex-wrap gap-1.5" style="display:none"></div>

          <!-- Description -->
          <div id="modal-desc-wrap" style="display:none">
            <p class="text-xs font-semibold text-slate-600 uppercase tracking-wide mb-1.5">Descripción</p>
            <p id="modal-desc" class="text-sm text-slate-300 leading-relaxed whitespace-pre-line bg-slate-800 rounded-lg p-3 max-h-40 overflow-y-auto"></p>
          </div>
        </div>
      </div>

      <div class="px-6 pb-5 flex items-center justify-between gap-3">
        <div class="flex items-center gap-2">
          <a id="modal-trello-btn" href="#" target="_blank" rel="noopener noreferrer"
          class="flex items-center gap-2 px-4 py-2 bg-[#0052CC] hover:bg-[#0065FF] text-white text-sm font-semibold rounded-lg transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor">
            <path d="M21 13v7a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h7v2H5v14h14v-6h2zM21 3h-5v2h3.586l-8.293 8.293 1.414 1.414L21 6.414V10h2V3h-2z"/>
          </svg>
          Ver en Trello
        </a>
          <!-- Drive button — shown only when card is in Drive stage and folder has content -->
          <a id="modal-drive-btn" href="#" target="_blank" rel="noopener noreferrer" style="display:none"
            class="flex items-center gap-2 px-4 py-2 bg-emerald-700 hover:bg-emerald-600 text-white text-sm font-semibold rounded-lg transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 87.3 78" fill="currentColor">
              <path d="m6.6 66.85 3.85 6.65c.8 1.4 1.95 2.5 3.3 3.3L27.5 53H0c0 1.55.4 3.1 1.2 4.5z" fill="#0066da"/>
              <path d="M43.65 25 29.9 1.2C28.55 2 27.4 3.1 26.6 4.5L1.2 48.5A9 9 0 0 0 0 53h27.5z" fill="#00ac47"/>
              <path d="M73.55 76.8c1.35-.8 2.5-1.9 3.3-3.3l1.6-2.75 7.65-13.25c.8-1.4 1.2-2.95 1.2-4.5H59.8l5.65 9.5z" fill="#ea4335"/>
              <path d="M43.65 25 57.4 1.2C56.05.4 54.5 0 52.9 0H34.4c-1.6 0-3.15.45-4.5 1.2z" fill="#00832d"/>
              <path d="M59.8 53H27.5L13.75 76.8c1.35.8 2.9 1.2 4.5 1.2h50.8c1.6 0 3.15-.45 4.5-1.2z" fill="#2684fc"/>
              <path d="M73.4 26.5l-12.7-22c-.8-1.4-1.95-2.5-3.3-3.3L43.65 25 59.8 53h27.45c0-1.55-.4-3.1-1.2-4.5z" fill="#ffba00"/>
            </svg>
            Ver en Drive
          </a>
          <span id="modal-drive-loading" style="display:none" class="text-xs text-slate-500 flex items-center gap-1.5">
            <span class="w-3 h-3 border border-slate-600 border-t-emerald-500 rounded-full animate-spin flex-shrink-0"></span>
            Buscando en Drive…
          </span>
          <span id="modal-drive-msg" style="display:none" class="text-xs text-slate-500"></span>
        </div>
        <button onclick="Agenda.closeModal()"
          class="px-4 py-2 bg-slate-800 hover:bg-slate-700 text-slate-300 text-sm font-semibold rounded-lg transition-colors">
          Cerrar
        </button>
      </div>
    </div>
  </div>

  <script src="js/timeCalc.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/cache.js"></script>
  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/drive.js"></script>
  <script src="js/agenda.js"></script>
  <script>
    // Verificar acceso antes de mostrar cualquier contenido
    const _access = Auth.checkPageAccess('agenda');
    if (!_access.allowed) {
      window.location.replace(_access.redirectTo || 'index.html');
    }

    function setState(name) {
      ['auth','loading','error','agenda'].forEach(s => {
        const el = document.getElementById('state-' + s);
        if (el) el.style.display = (name === s) ? 'block' : 'none';
      });
    }

    // Close modal on backdrop click
    document.getElementById('modal').addEventListener('click', function(e) {
      if (e.target === this) Agenda.closeModal();
    });

    // Render status legend
    function renderLegend() {
      const stages = TimeCalc.STAGES;
      document.getElementById('legend').innerHTML = Object.entries(stages).map(([, s]) => `
        <div class="flex items-center gap-1.5">
          <span class="w-2.5 h-2.5 rounded-full flex-shrink-0" style="background:${s.color}"></span>
          <span class="text-xs text-slate-500">${s.label}</span>
        </div>`).join('');
    }

    // Si el rol es agenda-member, bloquear filtro de miembro antes de que la página sea visible
    if (_access.lockedMemberId) {
      const _origPopulate = Agenda._populateFilters.bind(Agenda);
      Agenda._populateFilters = function(boards) {
        _origPopulate(boards);
        const sel = document.getElementById('member-filter');
        if (sel) {
          sel.value = _access.lockedMemberId;
          sel.disabled = true;
          sel.title = 'Filtro de miembro bloqueado';
          sel.classList.add('opacity-60', 'cursor-not-allowed');
        }
      };
    }

    // Aplicar credenciales de Trello embebidas en el token (usuarios sin configuración propia)
    Auth.applyEmbeddedCredentials();

    const _sidebarKeys = _access.role === 'admin' ? null : ['agenda'];
    Sidebar.init('agenda', { allowedKeys: _sidebarKeys, onRefresh: () => Agenda.load(true) });
    renderLegend();
    Agenda.load();
  </script>
</body>
</html>
